plugins {
    id 'java-library'
    id 'eclipse'
    id 'idea'
    id 'net.neoforged.moddev' version '2.0.74'
}

import groovy.lang.Closure
import org.gradle.api.Action
import org.gradle.api.file.FileCopyDetails

class ExpandPropertiesAction implements Action<FileCopyDetails>, Serializable {
    private final Map<String, ?> properties

    ExpandPropertiesAction(Map<String, ?> properties) {
        this.properties = new LinkedHashMap<>(properties)
    }

    @Override
    void execute(FileCopyDetails details) {
        details.expand(properties)
    }
}

group = mod_group_id
version = mod_version

base {
    archivesName = mod_id
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(java_version as int)
    }
    withSourcesJar()
}

neoForge {
    version = neo_version

    accessTransformers = files('src/main/resources/META-INF/accesstransformer.cfg')

    mods {
        create(mod_id) {
            sourceSet sourceSets.main
        }
    }

    runs {
        client {
            client()
            gameDirectory = file('run/client')
        }
        server {
            server()
            gameDirectory = file('run/server')
        }
    }
}

configurations {
    localRuntime
    runtimeClasspath.extendsFrom localRuntime
}

repositories {
    mavenCentral()
    maven {
        name = "Jared's Maven"
        url = "https://maven.blamejared.com/"
    }
    maven {
        name = "TerraformersMC"
        url = "https://maven.terraformersmc.com/"
    }
}

dependencies {
    // 完整 JEI（非仅 API）：编译期需要 RecipesGui、ImmutableRect2i 等实现类；运行时仍由 localRuntime 提供
    compileOnly "mezz.jei:jei-${minecraft_version}-neoforge:${jei_version}"
    compileOnly "mezz.jei:jei-${minecraft_version}-neoforge-api:${jei_version}"
    compileOnly "dev.emi:emi-neoforge:${emi_version}:api"
    compileOnly "org.appliedenergistics:appliedenergistics2:${ae2_version}"
    
    compileOnly files("../Applied-Energistics-2-neoforge-v19.2.17/Applied-Energistics-2-neoforge-v19.2.17/build/libs/appliedenergistics2-neoforge-19.2.17.jar")
    compileOnly files("../AdvancedAE-master/AdvancedAE-master/build/libs/advanced_ae-1.21.1-1.0.0.jar")
    compileOnly files("../ExtendedAE-1.21.1-neoforge/ExtendedAE-1.21.1-neoforge/build/libs/extendedae-1.21.1-1.0.0.jar")
    compileOnly files("../ExtendedAE_Plus-1.21.1/ExtendedAE_Plus-1.21.1/build/libs/extendedae_plus-1.21.1-1.0.0.jar")
    compileOnly files("../AE2WirelessTerminalLibrary-main/AE2WirelessTerminalLibrary-main/ae2wtlib_api/build/libs/ae2wtlib_api-0.0.0-SNAPSHOT.jar")

    localRuntime "mezz.jei:jei-${minecraft_version}-neoforge:${jei_version}"
    localRuntime "dev.emi:emi-neoforge:${emi_version}"
    localRuntime "org.appliedenergistics:appliedenergistics2:${ae2_version}"
}

tasks.named("processResources", ProcessResources).configure {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version           : neo_version,
            neo_version_range     : neo_version_range,
            loader_version_range  : loader_version_range,
            mod_id                : mod_id,
            mod_name              : mod_name,
            mod_license           : mod_license,
            mod_version           : mod_version,
            mod_authors           : mod_authors,
            mod_description       : mod_description
    ]
    inputs.properties replaceProperties

    filesMatching(["META-INF/neoforge.mods.toml", "pack.mcmeta"], new ExpandPropertiesAction(replaceProperties))
}

tasks.named("jar", Jar).configure {
    manifest {
        attributes([
                "Specification-Title"   : mod_id,
                "Specification-Vendor"  : mod_authors,
                "Specification-Version" : "1",
                "Implementation-Title"  : project.name,
                "Implementation-Version": project.version,
                "Implementation-Vendor" : mod_authors
        ])
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
}
