plugins {
    id 'java-library'
    id 'eclipse'
    id 'idea'
    id 'net.neoforged.moddev' version '2.0.74'
}

import groovy.lang.Closure
import org.gradle.api.Action
import org.gradle.api.file.FileCopyDetails

class ExpandPropertiesAction implements Action<FileCopyDetails>, Serializable {
    private final Map<String, ?> properties

    ExpandPropertiesAction(Map<String, ?> properties) {
        this.properties = new LinkedHashMap<>(properties)
    }

    @Override
    void execute(FileCopyDetails details) {
        details.expand(properties)
    }
}

group = mod_group_id
version = mod_version

base {
    archivesName = mod_id
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(java_version as int)
    }
    withSourcesJar()
}

neoForge {
    version = neo_version

    accessTransformers = files('src/main/resources/META-INF/accesstransformer.cfg')

    mods {
        create(mod_id) {
            sourceSet sourceSets.main
        }
    }

    runs {
        client {
            client()
            gameDirectory = file('run/client')
        }
        server {
            server()
            gameDirectory = file('run/server')
        }
    }
}

configurations {
    localRuntime
    runtimeClasspath.extendsFrom localRuntime
}

repositories {
    mavenCentral()
    maven {
        name = "CreateMod Maven"
        url = "https://maven.createmod.net"
    }
    maven {
        name = "Jared's Maven"
        url = "https://maven.blamejared.com/"
    }
    maven {
        name = "TerraformersMC"
        url = "https://maven.terraformersmc.com/"
    }
    exclusiveContent {
        forRepository {
            maven {
                url = "https://cursemaven.com"
            }
        }
        filter {
            includeGroup "curse.maven"
        }
    }
    maven {
        url = uri("https://modmaven.dev/")
        content {
            includeGroup "appeng"
            includeGroup "de.mari_023"
        }
    }
    maven {
        name = "Modrinth Maven"
        url = "https://api.modrinth.com/maven"
        content {
            includeGroup "maven.modrinth"
        }
    }
}

dependencies {
    compileOnly "mezz.jei:jei-${minecraft_version}-neoforge:${jei_version}"
    compileOnly "mezz.jei:jei-${minecraft_version}-neoforge-api:${jei_version}"
    compileOnly "dev.emi:emi-neoforge:${emi_version}:api"
    compileOnly "org.appliedenergistics:appliedenergistics2:${ae2_version}"
    compileOnly "maven.modrinth:create:6.0.10+mc${minecraft_version}"
    implementation "curse.maven:advancedae-1084104:7849217"
    runtimeOnly "curse.maven:geckolib-388172:7707149"
    implementation "curse.maven:ex-pattern-provider-892005:8025439"
    implementation "curse.maven:glodium-957920:5821676"
    implementation "curse.maven:extendedae-plus-1337639:7960385"
    implementation "curse.maven:applied-energistics-2-wireless-terminals-459929:8048692"
    implementation "de.mari_023:ae2wtlib_api:19.5.0"
    runtimeOnly "de.mari_023:ae2wtlib:19.5.0"

    localRuntime "mezz.jei:jei-${minecraft_version}-neoforge:${jei_version}"
    localRuntime "dev.emi:emi-neoforge:${emi_version}"
    localRuntime "org.appliedenergistics:appliedenergistics2:${ae2_version}"
}

tasks.named("processResources", ProcessResources).configure {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version           : neo_version,
            neo_version_range     : neo_version_range,
            loader_version_range  : loader_version_range,
            mod_id                : mod_id,
            mod_name              : mod_name,
            mod_license           : mod_license,
            mod_version           : mod_version,
            mod_authors           : mod_authors,
            mod_description       : mod_description
    ]
    inputs.properties replaceProperties

    filesMatching(["META-INF/neoforge.mods.toml", "pack.mcmeta"], new ExpandPropertiesAction(replaceProperties))
}

tasks.named("jar", Jar).configure {
    manifest {
        attributes([
                "Specification-Title"   : mod_id,
                "Specification-Vendor"  : mod_authors,
                "Specification-Version" : "1",
                "Implementation-Title"  : project.name,
                "Implementation-Version": project.version,
                "Implementation-Vendor" : mod_authors
        ])
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
}
